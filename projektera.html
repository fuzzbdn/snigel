<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projektering ETCS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="projektera-page">

 <div class="card">
<div class="nav-menu" no-print>
    <a href="home.html">⬅ Tillbaka</a>
    
    <div id="user-display" style="font-size: 0.9em; color: #666;"></div> 
</div>

    <h2>Projektering av Hastighetsnedsättning ETCS</h2>
    <div id="errorLog"></div>

    <div class="no-print" style="margin-bottom: 20px;">
        <label for="entrySelect">Hämta sparad planering</label>
        <select id="entrySelect"><option>Laddar...</option></select>
        <hr>
    </div>
 
    <h3>Detaljer</h3>
    <div class="grid">
        <div><label>Identitet</label><input id="identitet" readonly></div>
        <div><label>Sträcka</label><input id="stracka" readonly></div>
        <div>
			<label>Ställverkstyp</label>
			<select id="stallverkstyp">
                <option value="">Välj ställverkstyp</option>
                <option value="95">95</option>
                <option value="M11">M11</option>
			</select>
		</div>
        <div>
			<label>RBC</label>
			<select id="rbc">
                <option value="">Välj RBC</option>
                <option value="X4GV">X4GV</option>
                <option value="X4LIN">X4LIN</option>
                <option value="X4KRA">X4KRA</option>
                <option value="X4BLN">X4BLN</option>
                <option value="X4HP">X4HP</option>
			</select>
		</div>
        <div><label>STH</label><input id="sth" readonly></div>
        <div><label>Axellast</label><input id="axellast" readonly></div>
        <div><label>Tåglängd</label><input id="taglangd" readonly></div>
        <div><label>Riktning</label><input id="riktning" readonly></div>
        <div><label>Orsak</label><input id="orsaktext" readonly></div>
        <div><label>Spår</label><input id="spar" readonly></div>
    </div>

    <label style="margin-top:15px">Passerar nedsättningen RBC/RBC eller Systemgräns?</label>
    <select id="passerar"><option value="Nej">Nej</option><option value="Ja">Ja</option></select>
    <div id="passerarText">OBS: Projektering över gränser kräver särskild hantering.</div>
    
    <div id="routes-container"></div>
    
    <div class="no-print" style="margin:20px 0;">
        <button type="button" onclick="addNewRouteBlock()" class="btn-success">+ Lägg till ny sträcka</button>
    </div>

    <table class="control-table">
        <thead><tr><th width="30%">Åtgärd</th><th>Datum</th><th>Sign</th><th>Kommentar</th></tr></thead>
        <tbody>
            <tr><td class="label-cell">Egenkontroll</td><td><input type="date"></td><td><input></td><td><input></td></tr>
            <tr><td class="label-cell">Säkerhetsgranskad</td><td><input type="date"></td><td><input></td><td><input></td></tr>
            <tr><td class="label-cell">Definierad i RBC</td><td><input type="date"></td><td><input></td><td><input></td></tr>
        </tbody>
    </table>

    <div class="footer-row no-print">
	<button id="saveProjekteringBtn" class="btn-primary" disabled style="background-color: #6c757d; cursor: not-allowed; margin-right: auto;">
        💾 Spara & Klarmarkera
    </button>
        <button onclick="generateXML()" class="btn-ghost">💾 Skapa XML</button>
        <button type="button" class="btn-primary" onclick="printPage()">🖨️ Skriv ut</button>
    </div>
</div>

<script src="data.js"></script> <script src="script.js"></script>
</body>
</html>
