<body id="planera-page"></div><div class="card">

    <h1>Planering av hastighetsnedsättning</h1>

    <form id="hnsForm">
        <div class="grid">
            <div>
    <label for="planerare">Planerare *</label>
    <input id="planerare" name="planerare" type="text" readonly required style="background-color: #e9ecef; cursor: not-allowed;">
</div>
            <div><label for="orsak">Orsak</label><input id="orsak" name="orsak" type="text" placeholder="Ange orsak till nedsättningen"></div>
            <div><label for="from">Från (Datum & Tid) *</label><input id="from" name="from" type="datetime-local" required></div>
            <div><label for="to">Till</label><input id="to" name="to" type="text" value="Tillsvidare"></div>
            <div><label for="nedstracka">Nedsättningssträcka</label><input id="nedstracka" name="nedstracka" type="text" placeholder="Ex: DP1-DP2"></div>
            <div>
                <label>Sträcka (km)</label>
                <div class="km-row">
                    <input name="start_km" placeholder="Km" maxlength="4"><input name="start_m" placeholder="m" maxlength="3">
                    <span class="note">→</span>
                    <input name="slut_km" placeholder="Km" maxlength="4"><input name="slut_m" placeholder="m" maxlength="3">
                </div>
            </div>
            <div><label>Spår</label><input name="spar" type="text" placeholder="För vilket/vilka spår gäller nedsättningen?"></div>
            <div><label>Axellast *</label><select id="axellast" name="axellast" required><option value="">Välj...</option></select></div>
            <div><label>ETCS-kategori</label><input name="etcs" type="text" value="Alla"></div>
            <div><label>Riktning *</label><select id="riktning" name="riktning" required><option value="">Välj...</option></select></div>
            <div><label>Tåglängdsfördröjning *</label><select id="taglangd" name="taglangd" required><option value="">Välj...</option></select></div>
            <div><label>STH (km/h)</label><input name="sth" type="number" placeholder="Ange största tillåtna hastighet"></div>
            <div class="full-width"><label>Text till tåg</label><textarea name="textmeddelande">Dåligt spårläge</textarea></div>
            <div class="full-width"><label>Info till systemtekniker</label><textarea name="systeminfo" placeholder="Ange om det finns information som systemtekniker behöver få veta"></textarea></div>
        </div>

        <div class="actions">
            <button type="submit" class="btn-primary">Skicka beställning</button>
        </div>
    </form>
    
    </div>
<script src="script.js"></script>
</body>
